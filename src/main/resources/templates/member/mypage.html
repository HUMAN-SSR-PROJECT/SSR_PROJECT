<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="ko">
<head>
    <title>마이페이지</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/member-mypage.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content"
     class="mypage"
     th:classappend="${editMode} ? ' mypage--edit' : ' mypage--view'"
     data-mypage>
    <header class="mypage__hero">
        <div class="mypage__hero-inner">
            <p class="mypage__eyebrow">USER PROFILE</p>
            <h1 class="mypage__title">마이페이지</h1>
        </div>
    </header>

    <div class="mypage__body">
        <th:block th:if="${!editMode}">
            <section class="mypage__card mypage__card--profile">
                <div class="mypage__profile-row">
                    <div class="mypage__avatar" aria-hidden="true">
                        <img th:if="${member.imgUrl != null and !member.imgUrl.isEmpty()}"
                             th:src="${member.imgUrl}"
                             th:alt="${member.nickname + ' 프로필'}"
                             class="mypage__avatar-img">
                        <span th:unless="${member.imgUrl != null and !member.imgUrl.isEmpty()}"
                              class="mypage__avatar-initial"
                              th:text="${avatarInitial}">B</span>
                    </div>
                    <div class="mypage__nickname-block">
                        <p class="mypage__field-label">NICKNAME</p>
                        <p class="mypage__nickname" th:text="${member.nickname}">nickname</p>
                    </div>
                    <a class="mypage__btn mypage__btn--outline"
                       th:href="@{/member/mypage(edit=true)}">정보 수정</a>
                </div>
            </section>

            <section class="mypage__card mypage__card--info">
                <div class="mypage__info-row">
                    <span class="mypage__info-label">이메일</span>
                    <span class="mypage__info-value" th:text="${member.email}">email</span>
                </div>
                <div class="mypage__divider"></div>
                <div class="mypage__info-row">
                    <span class="mypage__info-label">한줄소개</span>
                    <span class="mypage__info-value"
                          th:text="${member.intro != null and !member.intro.isEmpty()} ? ${member.intro} : '—'">—</span>
                </div>
                <div class="mypage__divider"></div>
                <div class="mypage__info-row">
                    <span class="mypage__info-label">주소</span>
                    <span class="mypage__info-value mypage__info-value--muted"
                          th:text="${member.addr != null and !member.addr.isEmpty()} ? ${member.addr} : '—'">—</span>
                </div>
            </section>
        </th:block>

        <form th:if="${editMode}"
              class="mypage__edit-form"
              th:action="@{/member/update}"
              method="post"
              enctype="multipart/form-data"
              data-mypage-form>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <section class="mypage__card mypage__card--profile">
                <div class="mypage__profile-row">
                    <label class="mypage__avatar mypage__avatar--editable"
                           for="mypage-avatar-file">
                        <img th:if="${member.imgUrl != null and !member.imgUrl.isEmpty()}"
                             th:src="${member.imgUrl}"
                             th:alt="${member.nickname + ' 프로필'}"
                             class="mypage__avatar-img"
                             data-mypage-avatar-img>
                        <span th:unless="${member.imgUrl != null and !member.imgUrl.isEmpty()}"
                              class="mypage__avatar-initial"
                              data-mypage-avatar-initial
                              th:text="${avatarInitial}">B</span>
                        <span class="mypage__avatar-overlay" aria-hidden="true">
                            <svg width="20" height="20" viewBox="0 0 14 14" fill="none">
                                <rect x="1.5" y="3.5" width="11" height="8" rx="1" stroke="currentColor" stroke-width="1"/>
                                <circle cx="7" cy="7.5" r="2" stroke="currentColor" stroke-width="1"/>
                                <path d="M10 4.5H11.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                            </svg>
                            <span>변경</span>
                        </span>
                        <input type="file"
                               id="mypage-avatar-file"
                               name="imgUrl"
                               class="visually-hidden"
                               accept="image/jpeg,image/png,image/webp,image/gif"
                               data-mypage-avatar-input>
                    </label>
                    <div class="mypage__nickname-edit">
                        <p class="mypage__field-label">NICKNAME</p>
                        <div class="mypage__nickname-actions">
                            <input type="text"
                                   class="mypage__input mypage__input--nickname"
                                   name="nickname"
                                   maxlength="20"
                                   required
                                   th:value="${member.nickname}"
                                   autocomplete="nickname">
                            <button type="submit" class="mypage__btn mypage__btn--save">
                                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
                                    <path d="M1.5 5.5L4 8L9.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                저장
                            </button>
                            <a class="mypage__btn mypage__btn--cancel" th:href="@{/member/mypage}">
                                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
                                    <path d="M2 2L9 9M9 2L2 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                </svg>
                                취소
                            </a>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mypage__card mypage__card--info">
                <div class="mypage__info-row mypage__info-row--edit">
                    <span class="mypage__info-label">이메일</span>
                    <div class="mypage__info-field">
                        <div class="mypage__input mypage__input--readonly" th:text="${member.email}">email</div>
                        <p class="mypage__hint">이메일은 변경할 수 없습니다.</p>
                    </div>
                </div>
                <div class="mypage__divider"></div>
                <div class="mypage__info-row mypage__info-row--edit">
                    <span class="mypage__info-label">한줄소개</span>
                    <textarea class="mypage__textarea"
                              name="intro"
                              rows="3"
                              maxlength="300"
                              placeholder="나를 한 줄로 소개해 보세요"
                              th:text="${member.intro}"></textarea>
                </div>
                <div class="mypage__divider"></div>
                <div class="mypage__info-row mypage__info-row--edit">
                    <span class="mypage__info-label">주소</span>
                    <input type="text"
                           class="mypage__input"
                           name="addr"
                           maxlength="200"
                           placeholder="거주 주소를 입력하세요"
                           th:value="${member.addr}">
                </div>
            </section>
        </form>

        <div class="mypage__withdraw-wrap">
            <form th:action="@{/member/withdraw}"
                  method="post"
                  onsubmit="return confirm('정말 탈퇴하시겠습니까? 모든 독서 기록이 삭제됩니다.');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="mypage__btn mypage__btn--withdraw">회원 탈퇴</button>
            </form>
        </div>
    </div>
</div>
</body>

<th:block layout:fragment="extra-scripts">
    <script th:src="@{/js/member-mypage.js}"></script>
</th:block>
</html>
