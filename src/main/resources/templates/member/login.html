<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="ko">
<head>
    <title>로그인</title>
    <th:block layout:fragment="extra-head">
        <link rel="stylesheet" th:href="@{/css/member-auth.css}">
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <section class="auth" aria-labelledby="auth-login-title">
        <header class="auth__head">
            <h1 id="auth-login-title" class="auth__title">SIGN IN</h1>
            <p class="auth__subtitle">Digital Editorial Reading Log System</p>
        </header>

        <p class="auth__alert auth__alert--error"
           th:if="${param.error}"
           role="alert">이메일 또는 비밀번호가 올바르지 않습니다.</p>

        <form class="auth__form" th:action="@{/login}" method="post" data-auth-login novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="auth__field">
                <label class="visually-hidden" for="login-email">이메일</label>
                <input id="login-email"
                       class="auth__input"
                       type="email"
                       name="email"
                       autocomplete="email"
                       placeholder="EMAIL ADDRESS"
                       required>
                <span class="auth__icon" aria-hidden="true">
                    <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="3" width="13" height="9" rx="1" stroke="currentColor" stroke-width="1.1"/>
                        <path d="M1 4.5L7.5 9L14 4.5" stroke="currentColor" stroke-width="1.1"/>
                    </svg>
                </span>
            </div>

            <div class="auth__field">
                <label class="visually-hidden" for="login-password">비밀번호</label>
                <input id="login-password"
                       class="auth__input"
                       type="password"
                       name="password"
                       autocomplete="current-password"
                       placeholder="PASSWORD"
                       required>
                <span class="auth__icon" aria-hidden="true">
                    <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="7" width="9" height="6" rx="1" stroke="currentColor" stroke-width="1.1"/>
                        <path d="M5 7V5.5C5 3.57 6.57 2 8.5 2C10.43 2 12 3.57 12 5.5V7" stroke="currentColor" stroke-width="1.1"/>
                    </svg>
                </span>
            </div>

            <button type="submit" class="auth__submit">
                LOG IN
                <span class="auth__submit-icon" aria-hidden="true">
                    <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 7H12M12 7L8 3M12 7L8 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
            </button>
        </form>

        <div class="auth__footer">
            <p class="auth__footer-group">
                <span>처음이신가요?</span>
                <a class="auth__link" th:href="@{/member/join}">가입하기</a>
            </p>
            <p class="auth__footer-group">
                <a class="auth__link auth__link--muted" th:href="@{/member/find-account}">아이디 · 비밀번호 찾기</a>
            </p>
        </div>
    </section>
</div>
<th:block layout:fragment="extra-scripts">
    <script th:src="@{/js/member-auth.js}"></script>
</th:block>
</body>
</html>
