<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE | DONGNAEBOOK">DONGNAEBOOK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <th:block layout:fragment="extra-head"></th:block>
</head>
<body>
<div class="site-toast site-toast--success"
     th:if="${success}"
     data-site-toast
     role="status"
     aria-live="polite">
    <p class="site-toast__message" th:text="${success}">알림</p>
    <button type="button" class="site-toast__close" data-site-toast-close aria-label="닫기">×</button>
</div>
<div class="site-toast site-toast--error"
     th:if="${error}"
     data-site-toast
     role="alert"
     aria-live="assertive">
    <p class="site-toast__message" th:text="${error}">오류</p>
    <button type="button" class="site-toast__close" data-site-toast-close aria-label="닫기">×</button>
</div>
<div class="site-toast site-toast--warn"
     th:if="${param.needLogin != null}"
     data-site-toast
     role="alert"
     aria-live="assertive">
    <p class="site-toast__message">로그인이 필요한 서비스입니다.</p>
    <button type="button" class="site-toast__close" data-site-toast-close aria-label="닫기">×</button>
</div>
<div class="site">
    <header th:replace="~{fragments/header :: header}"></header>
    <main class="site-main" th:classappend="${mainClass}">
        <div layout:fragment="content"></div>
    </main>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
<script th:src="@{/js/common.js}"></script>
<th:block layout:fragment="extra-scripts"></th:block>
</body>
</html>
