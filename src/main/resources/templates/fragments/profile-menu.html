<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<div class="profile-menu"
     id="profile-menu"
     th:fragment="menu"
     data-profile-menu
     hidden>
    <div class="profile-menu__head">
        <p class="profile-menu__handle"
           th:text="${'@' + #strings.substringBefore(principal.email, '@')}">@reader</p>
        <p class="profile-menu__name" sec:authentication="principal.nickname">회원</p>
    </div>

    <div class="profile-menu__stats">
        <div class="profile-menu__stat">
            <span class="profile-menu__stat-icon" aria-hidden="true">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1.5 1.5H9.5V9.5H1.5V1.5Z" stroke="#111" stroke-width="0.9"/>
                    <path d="M3 3.5H8M3 5.5H8M3 7.5H6" stroke="#111" stroke-width="0.9" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="profile-menu__stat-num" th:text="${readingCount}">0</span>
            <span class="profile-menu__stat-label">읽는 중</span>
        </div>
        <div class="profile-menu__stat">
            <span class="profile-menu__stat-icon" aria-hidden="true">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 8V6M5.5 8V4M9 8V2" stroke="#111" stroke-width="0.9" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="profile-menu__stat-num" th:text="${finishedCount}">0</span>
            <span class="profile-menu__stat-label">완독</span>
        </div>
    </div>

    <nav class="profile-menu__nav" aria-label="프로필 메뉴">
        <a class="profile-menu__link" th:href="@{/member/mypage}">마이페이지</a>
        <a class="profile-menu__link" th:href="@{/mylib/readbook}">내 서재</a>
        <a class="profile-menu__link" th:href="@{/mylib/stats}">독서 통계</a>
        <a class="profile-menu__link profile-menu__link--admin"
           sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/dashboard}">
            <span class="profile-menu__admin-icon" aria-hidden="true">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6.5 1.2L7.6 4.4L11 4.7L8.5 7L9.2 10.4L6.5 8.7L3.8 10.4L4.5 7L2 4.7L5.4 4.4L6.5 1.2Z" stroke="#111" stroke-width="0.9" stroke-linejoin="round"/>
                </svg>
            </span>
            관리자 페이지
        </a>
    </nav>

    <form class="profile-menu__logout" th:action="@{/member/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">
            <span class="profile-menu__logout-icon" aria-hidden="true">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4.5 2H2.5V10H4.5" stroke="currentColor" stroke-width="1"/>
                    <path d="M7 6H4M7 6L5.5 4.5M7 6L5.5 7.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 3.5V8.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                </svg>
            </span>
            LOG OUT
        </button>
    </form>
</div>
</body>
</html>
