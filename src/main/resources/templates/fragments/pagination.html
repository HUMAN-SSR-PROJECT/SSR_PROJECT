<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<nav th:fragment="book-search(pageResult, keyword, city, district)"
     class="pagination"
     th:if="${pageResult != null and pageResult.totalPages > 1}"
     aria-label="검색 결과 페이지">
    <a class="pagination__btn"
       th:if="${pageResult.hasPrevious()}"
       th:href="@{/book/search/execute(keyword=${keyword}, city=${city}, district=${district}, page=${pageResult.page - 1})}"
       rel="prev">이전</a>
    <span class="pagination__summary"
          th:text="${pageResult.page + ' / ' + pageResult.totalPages + ' 페이지'}"
          th:attr="aria-current='page'">1 / 1 페이지</span>
    <a class="pagination__btn"
       th:if="${pageResult.hasNext()}"
       th:href="@{/book/search/execute(keyword=${keyword}, city=${city}, district=${district}, page=${pageResult.page + 1})}"
       rel="next">다음</a>
</nav>

</body>
</html>
