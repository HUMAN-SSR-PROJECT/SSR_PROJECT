<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<nav th:fragment="book-search(pageResult, keyword, city, district)"
     class="pagination"
     th:if="${pageResult != null and pageResult.totalPages > 1}"
     aria-label="검색 결과 페이지">
    <a class="pagination__btn"
       th:if="${pageResult.hasPrevious()}"
       th:href="@{/book/search/execute(keyword=${keyword}, city=${city}, district=${district}, page=${pageResult.page - 1})}"
       rel="prev">이전</a>
    <ol class="pagination__list">
        <li th:each="p : ${#numbers.sequence(1, pageResult.totalPages)}">
            <a class="pagination__num"
               th:href="@{/book/search/execute(keyword=${keyword}, city=${city}, district=${district}, page=${p})}"
               th:text="${p}"
               th:classappend="${p == pageResult.page} ? ' is-active' : ''"
               th:attr="aria-current=${p == pageResult.page} ? 'page' : null">1</a>
        </li>
    </ol>
    <a class="pagination__btn"
       th:if="${pageResult.hasNext()}"
       th:href="@{/book/search/execute(keyword=${keyword}, city=${city}, district=${district}, page=${pageResult.page + 1})}"
       rel="next">다음</a>
</nav>
