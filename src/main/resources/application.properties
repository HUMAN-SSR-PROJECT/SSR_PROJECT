spring.application.name=library

# OracleDB connection settings
server.port=8111
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/xe
spring.datasource.username=ssr_project
spring.datasource.password=ssrpro

# Kakao Map (브라우저 JS SDK — 지도만)
kakao.map.key=${KAKAO_MAP_JS_KEY}
# Kakao Local REST (서버 주소→좌표·거리 — JavaScript 키 사용 불가)
kakao.rest.key=${KAKAO_REST_API_KEY:}

# Public APIs
# 국립중앙도서관 SEOJI (ISBN 서지) — 도서 적재·스케줄
api.nl.cert-key=${NL_API_CERT_KEY}
# 도서관 정보나루 — 도서관 동기화·도서 검색 지역(소장) 필터
api.library.key=${LIBRARY_API_KEY}
# 검색 1회당 libSrchByBook 신규 호출 상한(캐시 미스만, 일 500건 한도 보호)
app.search.max-fresh-api-calls=40
# 상세 보유 도서관 탭 — bookExist(대출 여부) 신규 호출 상한
app.detail.max-fresh-loan-api-calls=20

# Firebase
firebase.config.path=${FIREBASE_CONFIG_PATH}
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET}